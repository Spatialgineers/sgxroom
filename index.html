<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGX Ope Ope Room</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: white; user-select: none; touch-action: none; }
    #root { width: 100%; height: 100%; }
    
    @keyframes shamblesFlash {
      0% { background-color: rgba(0, 255, 255, 0); }
      15% { background-color: rgba(0, 255, 255, 0.9); }
      100% { background-color: rgba(0, 255, 255, 0); }
    }
    .flash-active::after { 
        content: ''; position: absolute; inset: 0; pointer-events: none;
        animation: shamblesFlash 0.3s ease-out; z-index: 50;
    }
    ::-webkit-scrollbar { width: 0px; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.160.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber",
        "@react-three/postprocessing": "https://esm.sh/@react-three/postprocessing@2.16.0?external=react,react-dom,three,@react-three/fiber",
        "@mediapipe/tasks-vision": "https://esm.sh/@mediapipe/tasks-vision@0.10.17",
        "lucide-react": "https://esm.sh/lucide-react@0.303.0?external=react"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useEffect, useRef, useState, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import * as THREE from 'three';
    import { Canvas, useFrame, useThree } from '@react-three/fiber';
    import { PerspectiveCamera, useGLTF } from '@react-three/drei';
    import { HandLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';
    import { Activity, Scissors, ChevronUp, ChevronDown, Layers, Crosshair } from 'lucide-react';

    const BRAND = { CYAN: '#00ffff', MAGENTA: '#ff00ff', TARGET: '#00ffff' };

    useGLTF.preload('https://static.wixstatic.com/3d/fe81a7_671d80a702e24ca28b2b3b3fe936de2f.glb');
    useGLTF.preload('https://static.wixstatic.com/3d/fe81a7_25ae6c9870b849de9299c8752be38376.glb');
    useGLTF.preload('https://static.wixstatic.com/3d/fe81a7_b0f4340e6ae6485fa974813fa445c6e6.glb');

    // ==========================================
    // SHADER DE FONDO NEURAL AR (TINT ENVOLVENTE)
    // ==========================================
    const ARBackground = ({ videoRef, appStateRef }) => {
        const { size } = useThree();
        const materialRef = useRef();
        const [videoTex, setVideoTex] = useState(null);
        const currentProgress = useRef(0);

        useEffect(() => {
            if (videoRef.current) {
                const tex = new THREE.VideoTexture(videoRef.current);
                tex.minFilter = THREE.LinearFilter;
                tex.magFilter = THREE.LinearFilter;
                setVideoTex(tex);
            }
        }, [videoRef]);

        const uniforms = useMemo(() => ({
            tDiffuse: { value: null },
            uRoomProgress: { value: 0.0 },
            uTime: { value: 0.0 },
            uResolution: { value: new THREE.Vector2(1, 1) }
        }), []);

        useEffect(() => {
            if (videoTex) uniforms.tDiffuse.value = videoTex;
        }, [videoTex, uniforms]);

        useFrame((state, delta) => {
            if (materialRef.current) {
                const target = appStateRef.current.roomActive ? 1.0 : 0.0;
                currentProgress.current += (target - currentProgress.current) * (delta * 5.0);
                
                materialRef.current.uniforms.uRoomProgress.value = currentProgress.current;
                materialRef.current.uniforms.uTime.value = state.clock.elapsedTime;
                materialRef.current.uniforms.uResolution.value.set(size.width, size.height);
            }
        });

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D tDiffuse;
            uniform float uRoomProgress;
            uniform float uTime;
            uniform vec2 uResolution;
            varying vec2 vUv;

            float getLuma(vec3 c) { return dot(c, vec3(0.299, 0.587, 0.114)); }

            void main() {
                vec2 uv = vUv;
                uv.x = 1.0 - uv.x; // Modo espejo

                vec4 texColor = texture2D(tDiffuse, uv);
                vec3 color = texColor.rgb;

                vec2 texel = 1.0 / uResolution;
                
                // Sobel Edge Detection (Bordes crudos)
                float s00 = getLuma(texture2D(tDiffuse, uv + texel * vec2(-1.0, -1.0)).rgb);
                float s22 = getLuma(texture2D(tDiffuse, uv + texel * vec2(1.0, 1.0)).rgb);
                float s02 = getLuma(texture2D(tDiffuse, uv + texel * vec2(-1.0, 1.0)).rgb);
                float s20 = getLuma(texture2D(tDiffuse, uv + texel * vec2(1.0, -1.0)).rgb);
                float rawEdge = abs(s00 - s22) + abs(s02 - s20);
                
                // Umbral limpio: Evita marcar texturas de piel suaves, solo bordes fuertes
                float cleanEdge = smoothstep(0.15, 0.4, rawEdge);
                
                // Neural Grid Proporcional
                vec2 aspectUv = uv;
                aspectUv.x *= uResolution.x / uResolution.y;
                vec2 gridUv = aspectUv * 120.0; 
                vec2 cellCenter = fract(gridUv) - 0.5;
                float dotGrid = 1.0 - step(0.1, length(cellCenter));

                vec3 neonCyan = vec3(0.0, 1.0, 1.0);
                
                // 1. Tinte Envolvente (Luz Azul/Cyan Ambiental)
                // Sumamos luz azul a tu color base multiplicándolo, creando un filtro envolvente
                // sin transformar tu piel en azul puro.
                vec3 roomLight = vec3(0.1, 0.4, 0.7); 
                vec3 tintedColor = mix(color, (color * 0.7) + (roomLight * 0.5), 0.85);
                
                // 2. Neon Border Glow (Limpio y concentrado en la silueta)
                vec3 edgeGlow = neonCyan * cleanEdge * 3.0;
                
                // 3. Grid Suave (Menos brillante para no distraer)
                vec3 gridGlow = vec3(0.0, 0.5, 0.8) * dotGrid * 0.15;
                
                // Sumamos los brillos a la imagen base
                vec3 arColor = tintedColor + edgeGlow + gridGlow;
                
                // Transición suave al abrir/cerrar el Room
                color = mix(color, arColor, clamp(uRoomProgress, 0.0, 1.0));

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        if (!videoTex) return null;

        return (
            <mesh renderOrder={-1} frustumCulled={false}>
                <planeGeometry args={[2, 2]} />
                <shaderMaterial 
                    ref={materialRef}
                    vertexShader={vertexShader}
                    fragmentShader={fragmentShader}
                    uniforms={uniforms}
                    depthWrite={false}
                    depthTest={false}
                />
            </mesh>
        );
    };

    // ==========================================
    // CÁLCULO EXACTO DEL ESPACIO
    // ==========================================
    const ViewportTracker = ({ viewportRef }) => {
        const { viewport } = useThree();
        useFrame(() => { viewportRef.current = viewport; });
        return null;
    };

    // ==========================================
    // UI HOLOGRÁFICA (PUNTEROS) - SMOOTH LERP
    // ==========================================
    const HoloPointer = ({ positionRef, color, isTrackedRef, pinchType }) => {
        const ref = useRef();
        const currentPos = useRef(new THREE.Vector3());

        useFrame((state, delta) => {
            if (!ref.current) return;
            const tracked = isTrackedRef.current;
            ref.current.visible = tracked;
            if (!tracked) return;
            
            currentPos.current.lerp(positionRef.current, delta * 20.0);
            ref.current.position.copy(currentPos.current);
            
            ref.current.rotation.x += delta * 3;
            ref.current.rotation.y += delta * 2;
            
            let scale = pinchType ? 0.4 : 1.0;
            ref.current.scale.lerp(new THREE.Vector3(scale, scale, scale), delta * 15.0);
        });

        return (
            <group ref={ref}>
                <mesh>
                    <sphereGeometry args={[0.15, 16, 16]} />
                    <meshBasicMaterial color={pinchType === 'pinky' ? '#ffffff' : color} toneMapped={false} transparent opacity={0.8} />
                </mesh>
                <mesh>
                    <torusGeometry args={[0.4, 0.02, 16, 32]} />
                    <meshBasicMaterial color={pinchType === 'pinky' ? '#ffffff' : color} toneMapped={false} transparent opacity={1} />
                </mesh>
            </group>
        );
    };

    // ==========================================
    // FRUTAS Y OBJETOS 3D
    // ==========================================
    const DevilFruit = ({ url, activePlanes, color, isHeartless, scale }) => {
        const { scene } = useGLTF(url);
        
        const outerScene = useMemo(() => {
            const s = scene.clone(true);
            s.traverse((child) => { if (child.isMesh) child.material = child.material.clone(); });
            return s;
        }, [scene]);

        const innerScene = useMemo(() => {
            const s = scene.clone(true);
            s.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: color, emissive: color, emissiveIntensity: 4, toneMapped: false, side: THREE.BackSide
                    });
                }
            });
            return s;
        }, [scene, color]);

        useEffect(() => {
            outerScene.traverse((child) => {
                if (child.isMesh) {
                    if (isHeartless) {
                        child.material = new THREE.MeshBasicMaterial({ color: color, wireframe: true, transparent: true, opacity: 0.15, toneMapped: false, clippingPlanes: activePlanes });
                    } else {
                        child.material.clippingPlanes = activePlanes;
                        child.material.side = THREE.FrontSide;
                    }
                }
            });
            innerScene.traverse((child) => { if (child.isMesh) child.material.clippingPlanes = activePlanes; });
        }, [outerScene, innerScene, activePlanes, isHeartless, color]);

        return (
            <group scale={[scale, scale, scale]}>
                <primitive object={outerScene} />
                {!isHeartless && <primitive object={innerScene} />}
            </group>
        );
    };

    const DestructibleEntity = ({ data, appStateRef }) => {
        const ref = useRef();
        const targetGlowRef = useRef();
        const amputatePlane = useMemo(() => new THREE.Plane(), []);
        const currentPos = useRef(data.pos.clone());

        useFrame((state, delta) => {
            if (!ref.current) return;
            
            currentPos.current.lerp(data.pos, delta * 15.0);
            ref.current.position.copy(currentPos.current);
            ref.current.quaternion.slerp(data.rot, delta * 10.0);

            const isTargeted = appStateRef.current.targetIds.includes(data.id);
            if (targetGlowRef.current) {
                targetGlowRef.current.visible = isTargeted;
                if (isTargeted) {
                    targetGlowRef.current.rotation.x += delta * 0.5;
                    targetGlowRef.current.rotation.y += delta * 0.5;
                    targetGlowRef.current.material.opacity = 0.8 + Math.sin(state.clock.elapsedTime * 8) * 0.2;
                }
            }

            if (data.cutPlaneLocal) {
                const matrix = new THREE.Matrix4().compose(ref.current.position, ref.current.quaternion, new THREE.Vector3(1,1,1));
                amputatePlane.copy(data.cutPlaneLocal).applyMatrix4(matrix);
            }
        });

        const activePlanes = data.cutPlaneLocal ? [amputatePlane] : [];
        const boxGeo = useMemo(() => new THREE.BoxGeometry(1.6, 1.6, 1.6), []);
        const edgesGeo = useMemo(() => new THREE.EdgesGeometry(boxGeo), [boxGeo]);

        return (
            <group ref={ref}>
                <lineSegments ref={targetGlowRef} scale={(data.scale || 1)} visible={false} geometry={edgesGeo}>
                    <lineBasicMaterial color={BRAND.TARGET} linewidth={3} toneMapped={false} transparent opacity={0.8} />
                </lineSegments>

                {data.type === 'heart_cube' ? (
                    <group scale={[0.8, 0.8, 0.8]}>
                        <mesh>
                            <boxGeometry args={[1.2, 1.2, 1.2]} />
                            <meshStandardMaterial color={data.color} emissive={data.color} emissiveIntensity={1} toneMapped={false} transparent opacity={0.9} />
                        </mesh>
                        <lineSegments>
                            <edgesGeometry args={[new THREE.BoxGeometry(1.3, 1.3, 1.3)]} />
                            <lineBasicMaterial color={BRAND.CYAN} linewidth={2} toneMapped={false} />
                        </lineSegments>
                    </group>
                ) : (
                    <React.Suspense fallback={null}>
                        <DevilFruit url={data.url} activePlanes={activePlanes} color={data.color} isHeartless={data.isHeartless} scale={data.scale} />
                    </React.Suspense>
                )}
            </group>
        );
    };

    // ==========================================
    // MOTOR PRINCIPAL AR
    // ==========================================
    function App() {
        const videoRef = useRef(null);
        
        const viewportRef = useRef({ width: 20, height: 15 });
        const appState = useRef({ roomActive: false, targetIds: [] });
        const pointers = useRef({ leftTracked: false, rightTracked: false, rightPinchType: null, leftPinchType: null });
        
        const [uiState, setUiState] = useState({ roomActive: false, targetCount: 0, debugLog: "SISTEMA AR LISTO", flash: false });
        const [isMenuOpen, setIsMenuOpen] = useState(false);
        const [, setRenderTick] = useState(0); 

        const leftPointerRef = useRef(new THREE.Vector3());
        const rightPointerRef = useRef(new THREE.Vector3());
        const prevGesturesLeft = useRef({});

        const randomPos = () => new THREE.Vector3((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 8 + 2, (Math.random() - 0.5) * 4 - 2);

        const entitiesRef = useRef([
            { id: 'e1', type: 'gomu', url: 'https://static.wixstatic.com/3d/fe81a7_671d80a702e24ca28b2b3b3fe936de2f.glb', pos: randomPos(), rot: new THREE.Quaternion(), state: 'intact', color: '#9900ff', scale: 1.0 },
            { id: 'e2', type: 'ope',  url: 'https://static.wixstatic.com/3d/fe81a7_25ae6c9870b849de9299c8752be38376.glb', pos: randomPos(), rot: new THREE.Quaternion(), state: 'intact', color: '#ff0055', scale: 1.8 },
            { id: 'e3', type: 'mera', url: 'https://static.wixstatic.com/3d/fe81a7_b0f4340e6ae6485fa974813fa445c6e6.glb', pos: randomPos(), rot: new THREE.Quaternion(), state: 'intact', color: '#ff5500', scale: 1.2 },
            { id: 'e4', type: 'gomu', url: 'https://static.wixstatic.com/3d/fe81a7_671d80a702e24ca28b2b3b3fe936de2f.glb', pos: randomPos(), rot: new THREE.Quaternion(), state: 'intact', color: '#00ffff', scale: 1.0 }
        ]);

        const timersRef = useRef({ lastRoomToggle: 0, lastAction: 0, lastTarget: 0, fistHold: null });
        const grabbedItemRef = useRef(null);
        const grabOffsetRef = useRef(new THREE.Vector3());

        const dispatchUI = (logMsg, overrideFlash = false) => {
            setUiState(prev => ({
                roomActive: appState.current.roomActive, targetCount: appState.current.targetIds.length, 
                debugLog: logMsg || prev.debugLog, flash: overrideFlash ? true : prev.flash
            }));
            if (overrideFlash) setTimeout(() => setUiState(prev => ({ ...prev, flash: false })), 300);
        };

        const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y, p1.z - p2.z);

        const getHandPos3D = (lm) => {
            const vW = viewportRef.current.width;
            const vH = viewportRef.current.height;
            return new THREE.Vector3((0.5 - lm.x) * vW, (0.5 - lm.y) * vH, -lm.z * 40);
        };

        const analyzeGestures = (landmarks) => {
            const wrist = landmarks[0];
            const thumbTip = landmarks[4];
            
            const isExtended = (tip, pip) => dist(landmarks[tip], wrist) > dist(landmarks[pip], wrist);
            const indexExt = isExtended(8, 6);
            const middleExt = isExtended(12, 10);
            const ringExt = isExtended(16, 14);
            const pinkyExt = isExtended(20, 18);

            const closedFingersCount = (!indexExt?1:0) + (!middleExt?1:0) + (!ringExt?1:0) + (!pinkyExt?1:0);
            const isFist = closedFingersCount === 4;

            const isIndexPinch = dist(thumbTip, landmarks[8]) < 0.05 && dist(thumbTip, landmarks[12]) > 0.08 && !isFist;
            const isPinkyPinch = dist(thumbTip, landmarks[20]) < 0.06 && dist(thumbTip, landmarks[8]) > 0.1 && !isFist;

            const isPeace = indexExt && middleExt && !ringExt && !pinkyExt && !isIndexPinch;

            const v1 = new THREE.Vector3().subVectors(getHandPos3D(landmarks[5]), getHandPos3D(wrist));
            const v2 = new THREE.Vector3().subVectors(getHandPos3D(landmarks[17]), getHandPos3D(wrist));
            const normal = new THREE.Vector3().crossVectors(v2, v1).normalize(); 
            const isPalmDown = normal.y < -0.15;

            const isOpen = indexExt && middleExt && ringExt && pinkyExt;

            return { isPalmDown, palmNormal: normal, isIndexPinch, isPinkyPinch, isPeace, isOpen, isFist };
        };

        useEffect(() => {
            let landmarker;
            let reqId;

            const init = async () => {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm");
                landmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 2
                });

                if (navigator.mediaDevices) {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                    });
                    videoRef.current.srcObject = stream;
                    videoRef.current.onloadedmetadata = () => videoRef.current.play();
                }
            };
            init();

            const processFrame = () => {
                if (videoRef.current?.readyState >= 2 && landmarker) {
                    const results = landmarker.detectForVideo(videoRef.current, performance.now());
                    const now = performance.now();
                    
                    if (results.landmarks && results.landmarks.length > 0) {
                        let leftHand = null, rightHand = null;
                        
                        results.handednesses.forEach((h, i) => {
                            if (h[0].categoryName === "Right") leftHand = results.landmarks[i];
                            else if (h[0].categoryName === "Left") rightHand = results.landmarks[i];
                        });

                        pointers.current.leftTracked = !!leftHand;
                        pointers.current.rightTracked = !!rightHand;

                        if (rightHand) {
                            const gestures = analyzeGestures(rightHand);
                            const rightPos = getHandPos3D(rightHand[9]);
                            const indexTip = getHandPos3D(rightHand[8]);

                            rightPointerRef.current.copy(indexTip);
                            pointers.current.rightPinchType = gestures.isPinkyPinch ? 'pinky' : (gestures.isIndexPinch ? 'index' : null);

                            if (gestures.isIndexPinch) {
                                if (!grabbedItemRef.current) {
                                    let closest = null, minDist = Infinity;
                                    entitiesRef.current.forEach(ent => {
                                        const d = indexTip.distanceTo(ent.pos);
                                        if (d < 6.0 && d < minDist) { minDist = d; closest = ent; }
                                    });
                                    if (closest) {
                                        grabbedItemRef.current = closest;
                                        grabOffsetRef.current.subVectors(closest.pos, indexTip); 
                                    }
                                }
                                if (grabbedItemRef.current) {
                                    grabbedItemRef.current.pos.copy(indexTip).add(grabOffsetRef.current); 
                                }
                            } else {
                                grabbedItemRef.current = null;
                            }

                            if (gestures.isPinkyPinch && (now - timersRef.current.lastTarget > 1000)) {
                                let closest = null, minDist = Infinity;
                                entitiesRef.current.forEach(ent => {
                                    const d = indexTip.distanceTo(ent.pos);
                                    if (d < 10.0 && d < minDist) { minDist = d; closest = ent; }
                                });
                                
                                if (closest) {
                                    if (appState.current.targetIds.includes(closest.id)) {
                                        appState.current.targetIds = appState.current.targetIds.filter(id => id !== closest.id);
                                        dispatchUI(`TARGET: DESACTIVADO`);
                                    } else {
                                        appState.current.targetIds.push(closest.id);
                                        dispatchUI(`TARGET: ENLAZADO`);
                                    }
                                    timersRef.current.lastTarget = now;
                                }
                            }
                        } else {
                            grabbedItemRef.current = null;
                        }

                        if (leftHand) {
                            const gestures = analyzeGestures(leftHand);
                            const leftPos = getHandPos3D(leftHand[9]);
                            leftPointerRef.current.copy(leftPos);
                            pointers.current.leftPinchType = gestures.isPinkyPinch ? 'pinky' : (gestures.isIndexPinch ? 'index' : null);

                            if (gestures.isOpen && gestures.isPalmDown) {
                                if (!appState.current.roomActive && (now - timersRef.current.lastRoomToggle > 1500)) {
                                    appState.current.roomActive = true;
                                    timersRef.current.lastRoomToggle = now;
                                    dispatchUI(`NEURAL ROOM: ON`);
                                }
                            }
                            
                            if (gestures.isFist && appState.current.roomActive) {
                                if (!timersRef.current.fistHold) {
                                    timersRef.current.fistHold = now; 
                                } else if (now - timersRef.current.fistHold > 800) { 
                                    appState.current.roomActive = false;
                                    timersRef.current.fistHold = null;
                                    timersRef.current.lastRoomToggle = now;
                                    dispatchUI(`NEURAL ROOM: OFF`);
                                }
                            } else {
                                timersRef.current.fistHold = null; 
                            }

                            if (appState.current.roomActive && appState.current.targetIds.length > 0 && (now - timersRef.current.lastAction > 1000)) {
                                
                                if (gestures.isIndexPinch && !prevGesturesLeft.current.isIndexPinch) {
                                    let entitiesChanged = false;
                                    appState.current.targetIds.forEach(tId => {
                                        const target = entitiesRef.current.find(e => e.id === tId && !e.cutPlaneLocal && e.type !== 'heart_cube');
                                        if (target) {
                                            const localNormal = gestures.palmNormal.clone().applyQuaternion(target.rot.clone().invert()).normalize();
                                            const localPlane = new THREE.Plane(localNormal, 0); 
                                            target.cutPlaneLocal = localPlane;
                                            
                                            const inversePlane = localPlane.clone();
                                            inversePlane.normal.negate();
                                            const offset = gestures.palmNormal.clone().multiplyScalar(1.5); 
                                            const newId = target.id + '_half';
                                            
                                            if (!entitiesRef.current.some(e => e.id === newId)) {
                                                entitiesRef.current.push({
                                                    id: newId, type: target.type, url: target.url, scale: target.scale,
                                                    pos: target.pos.clone().add(offset), rot: target.rot.clone(), 
                                                    state: 'halved', color: target.color, cutPlaneLocal: inversePlane, isHeartless: target.isHeartless
                                                });
                                                entitiesChanged = true;
                                            }
                                        }
                                    });
                                    if (entitiesChanged) {
                                        dispatchUI(`AMPUTATE: EJECUTADO`);
                                        timersRef.current.lastAction = now;
                                        setRenderTick(t => t + 1);
                                    }
                                }

                                if (gestures.isPinkyPinch && !prevGesturesLeft.current.isPinkyPinch) {
                                    let offsetZ = 2.5; 
                                    let entitiesChanged = false;
                                    appState.current.targetIds.forEach(tId => {
                                        const target = entitiesRef.current.find(e => e.id === tId && e.type !== 'heart_cube' && !e.isHeartless);
                                        if (target) {
                                            target.isHeartless = true; 
                                            const newId = target.id + '_heart';
                                            
                                            if (!entitiesRef.current.some(e => e.id === newId)) {
                                                entitiesRef.current.push({
                                                    id: newId, type: 'heart_cube', scale: 0.8,
                                                    pos: target.pos.clone().add(new THREE.Vector3(0, 0, offsetZ)), 
                                                    rot: new THREE.Quaternion(), state: 'extracted', color: target.color
                                                });
                                                entitiesChanged = true;
                                            }
                                            offsetZ += 2.0; 
                                        }
                                    });
                                    if (entitiesChanged) {
                                        dispatchUI(`MES: EJECUTADO`);
                                        timersRef.current.lastAction = now;
                                        setRenderTick(t => t + 1);
                                    }
                                }

                                if (gestures.isPeace && !prevGesturesLeft.current.isPeace) {
                                    if (appState.current.targetIds.length >= 2) {
                                        const t1 = entitiesRef.current.find(e => e.id === appState.current.targetIds[0]);
                                        const t2 = entitiesRef.current.find(e => e.id === appState.current.targetIds[1]);
                                        
                                        if (t1 && t2) {
                                            const tempPos = t1.pos.clone();
                                            t1.pos.copy(t2.pos);
                                            t2.pos.copy(tempPos);
                                            
                                            appState.current.targetIds = []; 
                                            dispatchUI(`SHAMBLES: COMPLETADO`, true); 
                                            timersRef.current.lastAction = now;
                                        }
                                    }
                                }
                            }
                            prevGesturesLeft.current = gestures;
                        } else {
                            timersRef.current.fistHold = null;
                        }

                    } else {
                        pointers.current.leftTracked = false;
                        pointers.current.rightTracked = false;
                        timersRef.current.fistHold = null;
                    }
                }
                reqId = requestAnimationFrame(processFrame);
            };
            reqId = requestAnimationFrame(processFrame);
            return () => { cancelAnimationFrame(reqId); landmarker?.close(); };
        }, []);

        return (
            <div className={`relative w-full h-screen select-none bg-black overflow-hidden ${uiState.flash ? 'flash-active' : ''}`}>
                <video ref={videoRef} className="fixed inset-0 w-full h-full object-cover -scale-x-100 opacity-0 pointer-events-none -z-10" playsInline muted />
                
                <div className="absolute inset-0 z-10 pointer-events-none">
                    <Canvas gl={{ localClippingEnabled: true, antialias: true, toneMapping: THREE.NoToneMapping }}>
                        <ViewportTracker viewportRef={viewportRef} />
                        <PerspectiveCamera makeDefault position={[0, 0, 24]} fov={45} />
                        
                        <ARBackground videoRef={videoRef} appStateRef={appState} />

                        <ambientLight intensity={0.5} />
                        <directionalLight position={[10, 20, 10]} intensity={0.7} color="#ffffff" />
                        <directionalLight position={[-10, -20, -10]} intensity={1.5} color={BRAND.CYAN} />
                        
                        <HoloPointer positionRef={leftPointerRef} color={BRAND.CYAN} isTrackedRef={{current: pointers.current.leftTracked}} pinchType={pointers.current.leftPinchType} />
                        <HoloPointer positionRef={rightPointerRef} color={BRAND.MAGENTA} isTrackedRef={{current: pointers.current.rightTracked}} pinchType={pointers.current.rightPinchType} />
                        
                        {entitiesRef.current.map(ent => (
                            <DestructibleEntity key={ent.id} data={ent} appStateRef={appState} />
                        ))}
                    </Canvas>
                </div>

                <div className="absolute top-6 left-6 z-20 pointer-events-none">
                    <div className="flex items-center gap-3 bg-black/60 backdrop-blur-md p-3 border-l-4 border-l-[#00ffff] rounded-r-xl shadow-2xl">
                        <Activity className="text-[#00ffff] w-5 h-5 animate-pulse" />
                        <div>
                            <h1 className="text-lg font-black uppercase leading-none tracking-tighter">SGX Ope <span className="text-[#00ffff]">Ope Room</span></h1>
                            <p className="text-[9px] text-[#00ffff] font-bold uppercase tracking-[0.2em]">{uiState.debugLog}</p>
                        </div>
                    </div>
                </div>

                <div className="absolute bottom-6 left-6 z-20 flex flex-col gap-2">
                    <div className="flex gap-2 pointer-events-none">
                        <div className={`px-3 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-lg border w-fit backdrop-blur-md transition-colors ${uiState.roomActive ? 'bg-cyan-900/40 border-cyan-400 text-cyan-400 shadow-[0_0_15px_rgba(0,255,255,0.3)]' : 'bg-black/40 border-white/20 text-neutral-400'}`}>
                            Room: {uiState.roomActive ? 'ENVUELTO' : 'OFF'}
                        </div>
                        <div className={`px-3 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-lg border w-fit backdrop-blur-md flex items-center gap-2 transition-colors ${uiState.targetCount > 0 ? 'bg-cyan-900/40 border-cyan-400 text-cyan-400 shadow-[0_0_15px_rgba(0,255,255,0.3)]' : 'bg-black/40 border-white/20 text-neutral-400'}`}>
                            <Crosshair className="w-3.5 h-3.5"/> Targets: {uiState.targetCount}
                        </div>
                    </div>
                    
                    <button 
                        onClick={() => setIsMenuOpen(!isMenuOpen)}
                        className="flex items-center justify-between gap-2 bg-black/80 backdrop-blur-md border border-white/20 rounded-xl px-4 py-2 text-xs font-black uppercase tracking-widest text-white shadow-xl hover:bg-white/10 transition-colors w-fit pointer-events-auto"
                    >
                        <span><Scissors className="inline w-3.5 h-3.5 mr-2 text-cyan-400"/> Operaciones</span>
                        {isMenuOpen ? <ChevronDown className="w-4 h-4"/> : <ChevronUp className="w-4 h-4"/>}
                    </button>

                    {isMenuOpen && (
                        <div className="bg-black/80 backdrop-blur-md border border-white/10 rounded-xl p-4 text-[10px] uppercase tracking-widest text-neutral-300 w-80 shadow-2xl origin-bottom animate-in fade-in slide-in-from-bottom-2 pointer-events-auto">
                            <div className="grid grid-cols-2 gap-4">
                                <ul className="space-y-2">
                                    <li className="text-magenta-400 font-bold border-b border-white/10 pb-1 mb-1">Mano Derecha (Control)</li>
                                    <li><span className="text-white">Pellizco Índice:</span> Mover Libremente</li>
                                    <li><span className="text-white">Pellizco Meñique:</span> Fijar Target</li>
                                </ul>
                                <ul className="space-y-2">
                                    <li className="text-cyan-400 font-bold border-b border-white/10 pb-1 mb-1">Mano Izq. (Poderes)</li>
                                    <li><span className="text-white">Palma Abajo:</span> Activar Neural Room</li>
                                    <li><span className="text-white">Puño Cerrado:</span> Sostener 1s para Apagar</li>
                                    <li><span className="text-white">Pellizco Índice:</span> Amputate (Corte)</li>
                                    <li><span className="text-white">Pellizco Meñique:</span> Mes (Núcleo)</li>
                                    <li><span className="text-white">Símbolo Paz (V):</span> Shambles</li>
                                </ul>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );
    }
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
