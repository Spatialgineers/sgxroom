<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law's Room - Spatialgineers Core</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020202; color: #0ff; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* UI y HUD */
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; text-shadow: 0 0 5px #0ff; }
        .hud-line { margin-bottom: 8px; font-size: 14px; font-weight: bold; letter-spacing: 1px; }
        .data-value { color: #fff; }
        .alert { color: #f0f; text-shadow: 0 0 5px #f0f; }
        
        /* Video Feed (El Ojo del Sistema) */
        #video-feed { position: absolute; top: 20px; right: 20px; width: 240px; height: 180px; transform: scaleX(-1); border: 1px solid #0ff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); z-index: 5; border-radius: 4px; object-fit: cover; opacity: 0.8; }
        
        /* Boot Screen para bypassear seguridad del navegador */
        #boot-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { padding: 15px 30px; font-size: 18px; font-weight: bold; color: #000; background: #0ff; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px #0ff; transition: all 0.1s; font-family: inherit; }
        #start-btn:active { transform: scale(0.95); box-shadow: 0 0 5px #0ff; }
        #status-log { margin-top: 20px; font-size: 12px; color: #888; max-width: 400px; text-align: center; }
    </style>
    <!-- MediaPipe Vision Task -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- BOOT SEQUENCE (Requiere interacción para permisos) -->
    <div id="boot-screen">
        <button id="start-btn">Iniciar Enlace Espacial (Ope Ope)</button>
        <div id="status-log">Esperando orden ejecutiva...</div>
    </div>

    <!-- HUD -->
    <div id="ui-layer">
        <div class="hud-line">SISTEMA: <span class="data-value" id="sys-status">STANDBY</span></div>
        <div class="hud-line">ROOM: <span class="data-value" id="room-status">INACTIVO</span></div>
        <div class="hud-line">VECTOR CORTE: <span class="data-value" id="cut-vector">[0.00, 0.00, 0.00]</span></div>
    </div>

    <!-- CÁMARA INVISIBLE PERO ACTIVA -->
    <video id="video-feed" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <script type="module">
        // Módulos estáticos para evitar fallos de importmap en sandboxes
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/controls/OrbitControls.js';

        // --- ARQUITECTURA DE VARIABLES ---
        let scene, camera, renderer, controls;
        let targetMeshGroup, roomSphere;
        const cuttingPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        const planeHelper = new THREE.PlaneHelper(cuttingPlane, 5, 0xff00ff);
        
        // Variables de Motor Espacial
        let handLandmarker, video;
        let lastVideoTime = -1;
        let isSystemActive = false;

        // Anti-Fricción (Suavizado de tracking)
        const LERP_FACTOR = 0.2;
        const targetPlaneNormal = new THREE.Vector3(0, 1, 0);
        let targetPlaneConstant = 0;

        // --- UI LOGGING ---
        const log = (msg) => document.getElementById('status-log').innerText = msg;

        // --- 1. BOOT SEQUENCE ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('start-btn').style.display = 'none';
            log("Inicializando Entorno 3D...");
            initThreeJS();
            
            log("Cargando Modelos de Visión (MediaPipe)...");
            await initMediaPipe();
            
            log("Solicitando acceso óptico...");
            await startCamera();
            
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('sys-status').innerText = "ONLINE";
            document.getElementById('sys-status').style.color = "#0f0";
            isSystemActive = true;
            
            renderLoop(); // Ignición del motor
        });

        // --- 2. THREE.JS KERNEL ---
        function initThreeJS() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020202, 0.02);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 8); // Vista frontal inicial

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.localClippingEnabled = true; // MANDATORIO PARA SHAMBLES
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Iluminación
            scene.add(new THREE.AmbientLight(0x222222));
            const pointLight = new THREE.PointLight(0x00ffff, 2, 20);
            pointLight.position.set(2, 5, 5);
            scene.add(pointLight);

            buildAssets();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function buildAssets() {
            // El Objeto a cortar (Geometría compleja)
            const geo = new THREE.TorusKnotGeometry(1.5, 0.4, 128, 32);
            
            // Material Capa Externa (Metálico)
            const matOut = new THREE.MeshStandardMaterial({
                color: 0x888888,
                roughness: 0.1,
                metalness: 0.9,
                clippingPlanes: [cuttingPlane],
                clipShadows: true,
                side: THREE.FrontSide
            });

            // Material Capa Interna (Núcleo de Energía)
            const matIn = new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x00aaaa,
                emissiveIntensity: 1,
                clippingPlanes: [cuttingPlane],
                clipShadows: true,
                side: THREE.BackSide
            });

            targetMeshGroup = new THREE.Group();
            targetMeshGroup.add(new THREE.Mesh(geo, matOut));
            targetMeshGroup.add(new THREE.Mesh(geo, matIn));
            scene.add(targetMeshGroup);

            // Esfera ROOM
            const roomGeo = new THREE.SphereGeometry(4, 32, 32);
            const roomMat = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                wireframe: true,
                transparent: true,
                opacity: 0.08
            });
            roomSphere = new THREE.Mesh(roomGeo, roomMat);
            roomSphere.scale.set(0.01, 0.01, 0.01);
            scene.add(roomSphere);

            // Helper de debug
            planeHelper.visible = false;
            scene.add(planeHelper);
        }

        // --- 3. MEDIAPIPE VISION ---
        async function initMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
        }

        async function startCamera() {
            video = document.getElementById('video-feed');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadeddata = () => resolve();
                });
            } catch (err) {
                console.error(err);
                alert("Error crítico: No hay cámara. El sistema requiere input visual.");
            }
        }

        // --- 4. TRADUCCIÓN BIOMÉTRICA -> MATEMÁTICA ---
        function updateSpatialLogic(landmarks) {
            // MediaPipe Coords (0 a 1). Transformamos a espacio local.
            // Punto 0 = Muñeca, 5 = Nudillo Indice, 17 = Nudillo Meñique, 9 = Nudillo Medio
            
            // Función Helper: De 2D MediaPipe a vector 3D crudo
            const toVec = (lm) => {
                // Invertimos X porque el video está en espejo (transform: scaleX(-1))
                return new THREE.Vector3(
                    -(lm.x - 0.5) * 10,  
                    -(lm.y - 0.5) * 10,  
                    -lm.z * 10
                );
            };

            const wrist = toVec(landmarks[0]);
            const indexBase = toVec(landmarks[5]);
            const pinkyBase = toVec(landmarks[17]);
            const middleBase = toVec(landmarks[9]);
            const thumbTip = toVec(landmarks[4]);
            const indexTip = toVec(landmarks[8]);

            // Lógica de "ROOM" (Pinch)
            const pinchDist = thumbTip.distanceTo(indexTip);
            if (pinchDist > 1.5) {
                roomSphere.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                document.getElementById('room-status').innerText = "EXPANDIDO";
                planeHelper.visible = true; // Mostrar plano solo si mano está abierta
            } else {
                roomSphere.scale.lerp(new THREE.Vector3(0.01, 0.01, 0.01), 0.2);
                document.getElementById('room-status').innerText = "COLAPSADO";
                planeHelper.visible = false;
            }

            // Lógica "SHAMBLES" (Normal del Plano)
            // Calculamos los vectores de la palma para obtener la normal perpendicular
            const v1 = new THREE.Vector3().subVectors(indexBase, wrist);
            const v2 = new THREE.Vector3().subVectors(pinkyBase, wrist);
            
            // Producto Cruz = Vector Normal a la palma
            const normal = new THREE.Vector3().crossVectors(v1, v2).normalize();
            
            // Apuntamos targets para el LERP (Suavizado)
            targetPlaneNormal.copy(normal);
            targetPlaneConstant = targetPlaneNormal.dot(middleBase); // El plano pasa por el nudillo central

            // Actualizar UI
            document.getElementById('cut-vector').innerText = `[${normal.x.toFixed(2)}, ${normal.y.toFixed(2)}, ${normal.z.toFixed(2)}]`;
        }

        // --- 5. RENDER LOOP ---
        function renderLoop() {
            requestAnimationFrame(renderLoop);
            if (!isSystemActive) return;

            // Inferencia de IA
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks.length > 0) {
                    updateSpatialLogic(results.landmarks[0]);
                } else {
                    planeHelper.visible = false;
                }
            }

            // Aplicar LERP al plano matemático
            cuttingPlane.normal.lerp(targetPlaneNormal, LERP_FACTOR).normalize();
            cuttingPlane.constant += (targetPlaneConstant - cuttingPlane.constant) * LERP_FACTOR;

            // Animación pasiva de la malla para ver el corte en acción
            targetMeshGroup.rotation.x += 0.005;
            targetMeshGroup.rotation.y += 0.008;

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
